name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so only the latest commit's CI
# consumes minutes. Lets rapid pushes skip stale verification.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions — this workflow only reads the repo. Override at the
# job level if a future step needs write (e.g. deploy, release).
permissions:
  contents: read

jobs:
  verify:
    name: Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      # TODO: re-enable once ESLint + `lint` script are added.
      # - name: Lint
      #   run: bun run lint

      # TODO: re-enable once Vitest + `test` script are added (frontend.md
      # standard: Vitest + Testing Library, 85% coverage target).
      # - name: Test
      #   run: bun run test

      - name: Build project
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
